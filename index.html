  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" id="hljs-theme" />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
  <style>
    /* ── Variables ── */
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --accent: #58a6ff;
      --accent2: #388bfd;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
      --sidebar-w: 272px;
      --header-h: 56px;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --bg2: #f6f8fa;
      --bg3: #eaeef2;
      --border: #d0d7de;
      --text: #1f2328;
      --text2: #636c76;
      --accent: #0969da;
      --accent2: #0550ae;
      --green: #1a7f37;
      --red: #cf222e;
      --purple: #8250df;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      z-index: 100;
    }
    .header-logo {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .header-spacer { flex: 1; }
    .header-btn {
      padding: 5px 13px;
      border-radius: 6px;
      font-size: 13px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      text-decoration: none;
      transition: all .15s;
      white-space: nowrap;
    }
    .header-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--accent); }
    .lang-btn {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      cursor: pointer;
      letter-spacing: .04em;
      transition: all .15s;
    }
    .lang-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Layout ── */
    .layout { display: flex; padding-top: var(--header-h); min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      height: calc(100vh - var(--header-h));
      position: sticky;
      top: var(--header-h);
      overflow-y: auto;
      padding: 12px 0;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 12px 16px 4px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--text2);
      text-decoration: none;
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: all .12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-item:hover { color: var(--text); background: var(--bg3); }
    .sidebar-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(88,166,255,.08);
      font-weight: 500;
    }
    .num {
      font-size: 11px;
      color: var(--text2);
      background: var(--bg3);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: var(--font-mono);
      flex-shrink: 0;
    }
    .sidebar-item.active .num { background: rgba(88,166,255,.2); color: var(--accent); }

    /* Mobile sidebar toggle */
    .sidebar-toggle {
      display: none;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-size: 17px;
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 90;
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      min-width: 0;
      padding: 40px 52px 80px;
      max-width: 920px;
    }

    @media(max-width: 900px) {
      .sidebar {
        position: fixed;
        top: var(--header-h);
        left: -100%;
        z-index: 95;
        transition: left .2s;
        height: calc(100vh - var(--header-h));
      }
      .sidebar.open { left: 0; }
      .sidebar-toggle { display: flex; align-items: center; }
      .sidebar-overlay.open { display: block; }
      .main { padding: 24px 20px 60px; max-width: 100%; }
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 50vh;
      color: var(--text2);
      font-size: 15px;
      gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Markdown body ── */
    .md-body h1 { font-size: 2em; font-weight: 700; padding-bottom: .3em; border-bottom: 1px solid var(--border); margin: 0 0 24px; }
    .md-body h2 { font-size: 1.5em; font-weight: 700; padding-bottom: .3em; border-bottom: 1px solid var(--border); margin: 40px 0 16px; }
    .md-body h3 { font-size: 1.2em; font-weight: 600; margin: 28px 0 12px; }
    .md-body h4 { font-size: 1em; font-weight: 600; margin: 20px 0 8px; }
    .md-body p { margin: 0 0 16px; }
    .md-body a { color: var(--accent); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body ul, .md-body ol { margin: 0 0 16px; padding-left: 2em; }
    .md-body li { margin: 4px 0; }
    .md-body blockquote {
      margin: 0 0 20px;
      padding: 12px 16px;
      border-left: 4px solid var(--accent);
      background: var(--bg2);
      border-radius: 0 6px 6px 0;
    }
    .md-body blockquote p { margin: 0; color: var(--text2); }
    .code-wrapper { position: relative; margin: 0 0 16px; }
    .md-body pre {
      background: var(--bg2) !important;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow-x: auto;
      margin: 0;
    }
    .md-body pre code {
      display: block;
      padding: 16px 20px !important;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      background: none !important;
    }
    .md-body code:not(pre code) {
      font-family: var(--font-mono);
      font-size: 85%;
      padding: .2em .4em;
      background: rgba(110,118,129,.2);
      border-radius: 4px;
    }
    .md-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 20px;
      font-size: 14px;
      display: block;
      overflow-x: auto;
    }
    .md-body th {
      background: var(--bg2);
      padding: 9px 14px;
      text-align: left;
      border: 1px solid var(--border);
      font-weight: 600;
    }
    .md-body td { padding: 7px 14px; border: 1px solid var(--border); vertical-align: top; }
    .md-body tr:nth-child(even) td { background: rgba(255,255,255,.02); }
    [data-theme="light"] .md-body tr:nth-child(even) td { background: rgba(0,0,0,.02); }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .md-body strong { font-weight: 600; }
    .md-body img { max-width: 100%; border-radius: 6px; }

    /* Copy button */
    .copy-btn {
      position: absolute;
      top: 8px; right: 8px;
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 11px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s;
    }
    .code-wrapper:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: var(--border); color: var(--text); }
    .copy-btn.copied { color: var(--green); border-color: var(--green); }

    /* ── Reading progress bar ── */
    #progress {
      position: fixed;
      top: var(--header-h); left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--purple));
      width: 0%;
      z-index: 200;
      transition: width .1s;
    }

    /* ── Back to top ── */
    #back-top {
      position: fixed;
      bottom: 28px; right: 24px;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 17px;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,.3);
      transition: transform .15s;
    }
    #back-top:hover { transform: scale(1.1); }
    #back-top.show { display: flex; }

    /* ── Home page ── */
    .home-hero {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
    }
    .home-hero h1 {
      font-size: 2.4em;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
      line-height: 1.25;
    }
    .home-hero p {
      font-size: 1.05em;
      color: var(--text2);
      max-width: 600px;
      margin-bottom: 24px;
      line-height: 1.7;
    }
    .home-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge {
      padding: 3px 11px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid;
    }
    .badge-blue  { background: rgba(88,166,255,.1);  color: var(--accent);  border-color: rgba(88,166,255,.3); }
    .badge-green { background: rgba(63,185,80,.1);   color: var(--green);   border-color: rgba(63,185,80,.3); }
    .badge-purple{ background: rgba(188,140,255,.1); color: var(--purple);  border-color: rgba(188,140,255,.3); }
    .badge-orange{ background: rgba(210,153,34,.1);  color: var(--orange);  border-color: rgba(210,153,34,.3); }

    .stat-row {
      display: flex;
      gap: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 32px 0;
      overflow: hidden;
    }
    .stat {
      flex: 1;
      text-align: center;
      padding: 20px 12px;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat-num { font-size: 1.8em; font-weight: 800; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }

    .section-title {
      font-size: 1.1em;
      font-weight: 700;
      color: var(--text);
      margin: 36px 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: all .15s;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,.2);
    }
    .card-num {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .card-desc { font-size: 12.5px; color: var(--text2); line-height: 1.5; }

    /* Learning path */
    .path-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .path-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .path-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .path-icon { font-size: 20px; }
    .path-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .path-sub { font-size: 12px; color: var(--text2); }
    .path-step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 0;
      font-size: 13px;
      color: var(--text2);
      border-top: 1px solid var(--border);
    }
    .path-step:first-of-type { border-top: none; }
    .step-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(88,166,255,.1);
      border: 1px solid rgba(88,166,255,.3);
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .path-step a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .path-step a:hover { text-decoration: underline; }

    /* Note box */
    .note-box {
      background: rgba(88,166,255,.06);
      border: 1px solid rgba(88,166,255,.25);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 13.5px;
      color: var(--text2);
      margin-bottom: 32px;
      display: flex;
      gap: 10px;
    }
    .note-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    @media(max-width: 640px) {
      .stat-row { flex-wrap: wrap; }
      .stat { min-width: calc(50% - 0px); border-bottom: 1px solid var(--border); }
      .home-hero h1 { font-size: 1.8em; }
    }
  </style>
</head>

const PAGE_KEYS = [

  '10-state-and-config','11-cost-and-history','12-advanced-features','13-security','14-misc-features',
];

/* ── State ── */
let currentLang = localStorage.getItem('lang') || 'zh';
let currentTheme = localStorage.getItem('theme') || 'dark';

/* ── Marked setup ── */
marked.setOptions({ breaks: true, gfm: true });
const renderer = new marked.Renderer();
renderer.code = function(code, lang) {
  let hl = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if (typeof hljs !== 'undefined') {
    if (lang && hljs.getLanguage(lang)) {
      try { hl = hljs.highlight(code, { language: lang }).value; } catch(e) {}
    } else {
      try { hl = hljs.highlightAuto(code).value; } catch(e) {}
    }
  }
  const lbl = currentLang === 'zh' ? '复制' : 'Copy';
  return `<div class="code-wrapper"><pre><code class="hljs">${hl}</code></pre><button class="copy-btn" onclick="copyCode(this)">${lbl}</button></div>`;
};
renderer.link = function(href, title, text) {
  if (href && href.match(/^\.?\/?[\w-]+\.md$/)) {
    const p = href.replace(/^\.\//,'').replace(/\.md$/, '');
    return `<a href="#" onclick="loadPage('${p}');return false;">${text}</a>`;
  }
  const ext = href && (href.startsWith('http') || href.startsWith('//'));
  return `<a href="${href}" ${ext ? 'target="_blank" rel="noopener"' : ''}>${text}</a>`;
};
marked.use({ renderer });

/* ── Utilities ── */
function t(key) { return I18N[currentLang][key]; }

function copyCode(btn) {
  const code = btn.previousElementSibling.querySelector('code').innerText;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = t('copied');
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t('copy'); btn.classList.remove('copied'); }, 1500);
  });
}

function applyLang() {
  document.documentElement.setAttribute('data-lang', currentLang);
  document.getElementById('lang-btn').textContent = currentLang === 'zh' ? 'EN' : '中文';
  document.querySelectorAll('.i18n').forEach(el => {
    el.textContent = el.dataset[currentLang] || el.textContent;
  });
  const dateEl = document.getElementById('footer-date');
  if (dateEl) dateEl.textContent = new Date('2026-03-31').toLocaleDateString(
    currentLang === 'en' ? 'en-US' : 'zh-CN',
    { year:'numeric', month:'long', day:'numeric' }
  );
  localStorage.setItem('lang', currentLang);
}

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  applyLang();
  const h = location.hash.slice(1) || 'home';
  // Reload current page content in new language
  loadPage(h);
}

function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.getElementById('theme-toggle').textContent = currentTheme === 'dark' ? '🌙' : '☀️';
  document.getElementById('hljs-theme').href = currentTheme === 'dark'
    ? 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css'
    : 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css';
  localStorage.setItem('theme', currentTheme);
}

function setActive(page) {
  document.querySelectorAll('.sidebar-item').forEach(e => {
    e.classList.toggle('active', e.dataset.page === page);
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

/* ── Scroll / progress ── */
window.addEventListener('scroll', () => {
  const scrolled = window.scrollY;
  const total = document.body.scrollHeight - window.innerHeight;
  document.getElementById('progress').style.width = total > 0 ? (scrolled / total * 100) + '%' : '0%';
  document.getElementById('back-top').classList.toggle('show', scrolled > 400);
}, { passive: true });

/* ── Home page ── */

/* ── Page loader ── */
async function loadPage(page) {
  const m = document.getElementById('main-content');
  setActive(page);
  window.history.pushState({ page }, '', '#' + page);

  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');

  if (page === 'home') {
    renderHome();
    window.scrollTo(0, 0);
    return;
  }

  m.innerHTML = `<div class="loading"><div class="spinner"></div>${t('loading')}</div>`;

  try {
    // Try lang-specific version first, fall back to Chinese (default)
    const prefix = currentLang === 'en' ? 'docs/en/' : 'docs/';
    let r = await fetch(prefix + page + '.md');
    if (!r.ok && currentLang === 'en') {
      // fallback to Chinese if English not yet available
      r = await fetch('docs/' + page + '.md');
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const md = await r.text();
    m.innerHTML = '<div class="md-body">' + marked.parse(md) + '</div>';
    if (typeof hljs !== 'undefined') {
      m.querySelectorAll('pre code:not(.hljs)').forEach(e => hljs.highlightElement(e));
    }
    window.scrollTo(0, 0);
  } catch(e) {
    m.innerHTML = `<div class="loading" style="color:var(--red)">❌ ${t('loadFail')}: ${e.message}</div>`;
  }
}

/* ── Init ── */
(function init() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.getElementById('theme-toggle').textContent = currentTheme === 'dark' ? '🌙' : '☀️';
  if (currentTheme === 'light') {
    document.getElementById('hljs-theme').href =
      'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css';
  }
  applyLang();
  const hash = location.hash.slice(1) || 'home';
  loadPage(hash);
  window.addEventListener('popstate', e => {
    if (e.state && e.state.page) loadPage(e.state.page);
  });
})();
